<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timed Trials – Feedback Experiment</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Timed Trial</h1>
    <p id="trial-instructions">Complete each 60‑second trial by clicking on the
      targets that appear. Your feedback type is assigned randomly.
    </p>
    <div id="game-container">
      <div id="circle" style="display:none;"></div>
      <div id="flash-overlay"></div>
      <div id="start-overlay">
        <p>Click anywhere inside the box to begin Trial <span id="trial-number-display"></span>.</p>
      </div>
      <div id="countdown" class="hidden"></div>
      <div id="result-overlay" class="hidden">
        <h2>Trial Complete</h2>
        <p id="result-text"></p>
      </div>
    </div>
  </main>
  <audio id="audio-hit" src="ding.wav"></audio>
  <audio id="audio-miss" src="buzz.wav"></audio>
  <script src="game.js"></script>
</body>
</html>
